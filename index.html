<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SD Label Pro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container">

  <div class="panel">
    <h2>SD Label Pro</h2>

    <label>Brand</label>
    <select id="brand"></select>

    <label>Model</label>
    <input id="model" placeholder="e.g. M9" />

    <label>Storage</label>
    <select id="storage"></select>

    <label>Style</label>
    <select id="theme"></select>

    <button id="download">Download JPG</button>
  </div>

  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
